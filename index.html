<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Threat Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f1f5f9;
    margin: 0;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
    color: #0ea5e9;
}

.top-bar {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 15px;
}

input {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
    width: 250px;
}

button {
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    background: #0ea5e9;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #0284c7;
}

.grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
    margin-top: 20px;
}

.row-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-3px);
}

h3 {
    margin-top: 0;
}

#map {
    height: 320px;
    border-radius: 10px;
}

#chart {
    height: 260px !important;
}

.badge {
    padding: 6px 12px;
    border-radius: 20px;
    font-weight: bold;
    display: inline-block;
}

.low { background: #22c55e; color:white; }
.medium { background: #f59e0b; color:white; }
.high { background: #ef4444; color:white; }

.loader {
    text-align: center;
    margin: 20px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h1>🛡 Cyber Threat Intelligence Dashboard</h1>

<div class="top-bar">
    <button onclick="getMyIP()">📍 Detect My IP</button>
    <input id="ipInput" placeholder="Enter IP Address">
    <button onclick="checkIP()">Analyze</button>
</div>

<div id="loader" class="loader"></div>

<div class="grid">

    <div class="card" id="result">
        Enter an IP or click Detect My IP
    </div>

    <div class="row-2">
        <div class="card">
            <h3>📍 Location Map</h3>
            <div id="map"></div>
        </div>

        <div class="card">
            <h3>📊 Threat Overview</h3>
            <canvas id="chart"></canvas>
        </div>
    </div>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// 🔑 ADD YOUR KEYS HERE
const geoApiKey = "c019492c73444c75a6c7264e0fdf3562";
const abuseApiKey = "29e24bd533ee0a2bd6fcdefd9437568c911186ee82efb1379f97e5f76257b1c1ba05ebfd25a197e6";

let map, chart;

// MAP
function initMap(lat=0, lon=0){
    if(map) map.remove();
    map = L.map('map').setView([lat, lon], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.marker([lat, lon]).addTo(map);
}
initMap();

// VALIDATION
function isValidIP(ip){
    const parts = ip.split(".");
    return parts.length === 4 && parts.every(p => +p >= 0 && +p <= 255);
}

// GET IP (NO KEY REQUIRED)
async function getMyIP(){
    const loader = document.getElementById("loader");
    loader.innerText = "Detecting your IP...";

    try {
        const res = await fetch("https://api.ipify.org?format=json");
        const data = await res.json();

        if(!data.ip) throw new Error();

        document.getElementById("ipInput").value = data.ip;
        loader.innerText = "";

        checkIP();

    } catch {
        loader.innerText = "";
        document.getElementById("result").innerHTML =
            "⚠️ Could not detect IP";
    }
}

// MAIN
async function checkIP(){
    const ip = document.getElementById("ipInput").value.trim();
    const result = document.getElementById("result");

    if(!ip || !isValidIP(ip)){
        result.innerHTML = "⚠️ Invalid IP address";
        return;
    }

    document.getElementById("loader").innerText = "Analyzing...";

    try{
        const geoRes = await fetch(`https://api.ipgeolocation.io/ipgeo?apiKey=${geoApiKey}&ip=${ip}`);
        const geo = await geoRes.json();

        const threatRes = await fetch(`https://api.abuseipdb.com/api/v2/check?ipAddress=${ip}`, {
            headers: {Key: abuseApiKey, Accept: "application/json"}
        });
        const threatData = await threatRes.json();

        document.getElementById("loader").innerText = "";

        if(!geo.ip || !threatData.data){
            throw new Error();
        }

        const threat = threatData.data;
        let score = threat.abuseConfidenceScore;

        let level = score > 70 ? "high" : score > 30 ? "medium" : "low";

        let message = score === 0 
            ? "No malicious activity reported"
            : score < 30
            ? "Low risk IP"
            : score < 70
            ? "Suspicious activity detected"
            : "High risk malicious IP";

        result.innerHTML = `
        <h2>🌐 IP Analysis</h2>
        <p><b>IP:</b> ${geo.ip}</p>
        <p><b>Location:</b> ${geo.city}, ${geo.country_name}</p>

        <hr>

        <h3>🛡 Threat Intelligence</h3>
        <p class="badge ${level}">${message}</p>

        <p>📊 <b>Abuse Score:</b> ${score}/100</p>
        <p>🚨 <b>Reports:</b> ${threat.totalReports}</p>
        <p>🕒 <b>Last Report:</b> ${threat.lastReportedAt || "None"}</p>
        `;

        initMap(geo.latitude, geo.longitude);

        if(chart) chart.destroy();

        chart = new Chart(document.getElementById("chart"), {
            type: "doughnut",
            data: {
                labels: ["Risk", "Safe"],
                datasets: [{
                    data: [score, 100-score],
                    backgroundColor: ["#ef4444", "#22c55e"]
                }]
            }
        });

    }catch{
        document.getElementById("loader").innerText = "";
        result.innerHTML = "⚠️ Error fetching data (Check API keys)";
    }
}

// AUTO LOAD
window.onload = getMyIP;
</script>

</body>
</html>
