<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Threat Intelligence Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #0f172a;
    margin: 0;
    color: #e2e8f0;
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
    color: #38bdf8;
}

/* TOP BAR */
.top-bar {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 20px;
}

input {
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #334155;
    width: 260px;
    background: #0f172a;
    color: white;
}

input:focus {
    outline: none;
    border-color: #38bdf8;
}

button {
    padding: 12px 18px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, #0ea5e9, #2563eb);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
    border: 1px solid rgba(56,189,248,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-4px);
}

#map {
    height: 320px;
    border-radius: 10px;
}

#chart {
    height: 260px !important;
}

/* BADGES */
.badge {
    padding: 6px 12px;
    border-radius: 20px;
    font-weight: bold;
    display: inline-block;
    margin: 10px 0;
}

.low { background: #16a34a; }
.medium { background: #f59e0b; }
.high { background: #ef4444; }

/* LOADER */
.loader {
    display: flex;
    justify-content: center;
    margin: 20px;
}

.spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #334155;
    border-top: 4px solid #38bdf8;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* MOBILE */
@media(max-width: 768px){
    .grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>🛡 Cyber Threat Intelligence Dashboard</h1>

<div class="top-bar">
    <button onclick="getMyIP()">📍 Detect My IP</button>
    <input id="ipInput" placeholder="Enter IP Address">
    <button onclick="checkIP()">Analyze</button>
    <button onclick="copyIP()">📋 Copy IP</button>
</div>

<div id="loader" class="loader"></div>

<div class="grid">
    <div class="card" id="result">Enter an IP or click Detect My IP</div>
    <div class="card"><div id="map"></div></div>
    <div class="card">
        <h3>Threat Overview</h3>
        <canvas id="chart"></canvas>
    </div>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const geoApiKey = "c019492c73444c75a6c7264e0fdf3562";
const abuseApiKey = "5ab01b65c2f490e6921044b734503fbc1506fe64c8dd13e2097e95f12448f5149ffef626d4b86811";

let map, chart;

/* MAP */
function initMap(lat=0, lon=0){
    if(map) map.remove();
    map = L.map('map').setView([lat, lon], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.marker([lat, lon]).addTo(map);
}
initMap();

/* VALIDATION */
function isValidIP(ip){
    const parts = ip.split(".");
    return parts.length === 4 && parts.every(p => +p >= 0 && +p <= 255);
}

/* LOADER */
function showLoader(){
    document.getElementById("loader").innerHTML = '<div class="spinner"></div>';
}
function hideLoader(){
    document.getElementById("loader").innerHTML = '';
}

/* GET MY IP */
async function getMyIP(){
    showLoader();

    const res = await fetch(`https://api.ipgeolocation.io/ipgeo?apiKey=${geoApiKey}`);
    const data = await res.json();

    document.getElementById("ipInput").value = data.ip;

    hideLoader();
    checkIP();
}

/* MAIN */
async function checkIP(){
    const ip = document.getElementById("ipInput").value.trim();
    const result = document.getElementById("result");

    if(!isValidIP(ip)){
        result.innerHTML = "⚠️ Invalid IP address";
        return;
    }

    showLoader();

    try{
        const [geo, threatRes] = await Promise.all([
            fetch(`https://api.ipgeolocation.io/ipgeo?apiKey=${geoApiKey}&ip=${ip}`).then(r=>r.json()),
            fetch(`https://api.abuseipdb.com/api/v2/check?ipAddress=${ip}`, {
                headers: {Key: abuseApiKey, Accept: "application/json"}
            }).then(r=>r.json())
        ]);

        hideLoader();

        const threat = threatRes.data;
        let score = threat.abuseConfidenceScore;

        let level = score > 70 ? "high" : score > 30 ? "medium" : "low";

        let message = score === 0 
            ? "No malicious activity reported"
            : score < 30
            ? "Low risk IP"
            : score < 70
            ? "Suspicious activity detected"
            : "High risk malicious IP";

        result.innerHTML = `
        <h2>🌐 IP Analysis</h2>
        <p><strong>IP Address:</strong> ${geo.ip}</p>
        <p><strong>Location:</strong> ${geo.city}, ${geo.country_name}</p>

        <hr>

        <h3>🛡 Threat Intelligence</h3>
        <div class="badge ${level}">${message}</div>

        <p><strong>Abuse Score:</strong> ${score}/100</p>
        <p><strong>Reports:</strong> ${threat.totalReports}</p>
        <p><strong>Last Report:</strong> ${threat.lastReportedAt || "None"}</p>
        `;

        initMap(geo.latitude, geo.longitude);

        if(chart) chart.destroy();

        chart = new Chart(document.getElementById("chart"), {
            type: "doughnut",
            data: {
                labels: ["Risk", "Safe"],
                datasets: [{
                    data: [score, 100-score],
                    backgroundColor: ["#ef4444", "#22c55e"]
                }]
            },
            options: {
                plugins: {
                    legend: {
                        labels: { color: "white" }
                    }
                }
            }
        });

    }catch(e){
        hideLoader();
        result.innerHTML = "⚠️ Error fetching data";
    }
}

/* COPY IP */
function copyIP(){
    const ip = document.getElementById("ipInput").value;
    navigator.clipboard.writeText(ip);
    alert("IP copied!");
}

/* ENTER KEY SUPPORT */
document.getElementById("ipInput")
.addEventListener("keypress", function(e){
    if(e.key === "Enter") checkIP();
});

/* AUTO LOAD */
window.onload = getMyIP;
</script>

</body>
</html>
