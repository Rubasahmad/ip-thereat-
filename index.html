<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Threat Intelligence Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f1f5f9;
    color: #0f172a;
    margin: 0;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
    color: #0ea5e9;
}

.top-bar {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
}

input {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
}

button {
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    background: #0ea5e9;
    color: white;
    cursor: pointer;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
}

#map { height: 300px; }
#riskChart { height: 250px !important; }

.loader {
    border: 4px solid #ddd;
    border-top: 4px solid #0ea5e9;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    animation: spin 1s linear infinite;
    margin: 20px auto;
}

.hidden { display: none; }

.high { color: red; font-weight: bold; }
.medium { color: orange; font-weight: bold; }
.low { color: green; font-weight: bold; }

.progress {
    height: 10px;
    background: #e2e8f0;
    border-radius: 10px;
    margin-top: 10px;
}

.progress-bar {
    height: 100%;
    border-radius: 10px;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">

<h1>🛡 Cyber Threat Intelligence Dashboard</h1>

<div class="top-bar">
    <button onclick="getMyIP()">📍 Detect My IP</button>
    <input id="ipInput" placeholder="Enter IP Address">
    <button onclick="checkIP()">Analyze</button>
</div>

<div id="loader" class="loader hidden"></div>

<div class="grid">
    <div class="card" id="result"></div>
    <div class="card"><div id="map"></div></div>
    <div class="card">
        <h3>Threat Graph</h3>
        <canvas id="riskChart"></canvas>
    </div>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const geoApiKey = "c019492c73444c75a6c7264e0fdf3562";
let map, chart;

// ================= MAP =================
function initMap(lat=0, lon=0){
    if(map) map.remove();
    map = L.map('map').setView([lat, lon], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.marker([lat, lon]).addTo(map);
}
initMap();

// ================= VALIDATION =================
function isValidIP(ip){
    return /^(25[0-5]|2[0-4]\\d|1\\d\\d|[1-9]?\\d)(\\.(25[0-5]|2[0-4]\\d|1\\d\\d|[1-9]?\\d)){3}$/.test(ip);
}

// ================= DEVICE =================
function getDeviceInfo() {
    let ua = navigator.userAgent;
    return {
        deviceType: /mobile/i.test(ua) ? "Mobile" : "Desktop",
        os: /windows/i.test(ua) ? "Windows" : /android/i.test(ua) ? "Android" : "Other",
        browser: /chrome/i.test(ua) ? "Chrome" : "Other",
        screen: `${screen.width} x ${screen.height}`
    };
}

// ================= ABUSE IPDB =================
async function getThreatData(ip){
    try {
        const res = await fetch(`https://api.abuseipdb.com/api/v2/check?ipAddress=${ip}&maxAgeInDays=90`, {
            method: "GET",
            headers: {
                "Key": "c0e1ac7594a8fe0085f90bc9d2e18d3e417422e95b95647c9382ae3f4b03ec4de87425932bbeeaf3",
                "Accept": "application/json"
            }
        });

        const result = await res.json();
        return result.data;

    } catch (error){
        console.error(error);
        return null;
    }
}

// ================= GET MY IP =================
async function getMyIP(){
    const res = await fetch(`https://api.ipgeolocation.io/ipgeo?apiKey=${geoApiKey}`);
    const data = await res.json();
    document.getElementById("ipInput").value = data.ip;
    checkIP();
}

// ================= MAIN FUNCTION =================
async function checkIP(){
    const ip = document.getElementById("ipInput").value.trim();
    const result = document.getElementById("result");
    const loader = document.getElementById("loader");

    if(!isValidIP(ip)){
        result.innerHTML = "Invalid IP";
        return;
    }

    loader.classList.remove("hidden");

    try{
        const [geo, threat] = await Promise.all([
            fetch(`https://api.ipgeolocation.io/ipgeo?apiKey=${geoApiKey}&ip=${ip}`).then(r => r.json()),
            getThreatData(ip)
        ]);

        loader.classList.add("hidden");

        let abuse = threat?.abuseConfidenceScore || 0;
        let reports = threat?.totalReports || 0;

        let risk = abuse + (reports > 10 ? 10 : 0);
        if(risk > 100) risk = 100;

        let level = risk > 70 ? "high" : risk > 30 ? "medium" : "low";

        let device = getDeviceInfo();

        result.innerHTML = `
        <h3>IP Info</h3>
        <p><b>${geo.ip}</b></p>
        <p>${geo.city}, ${geo.country_name}</p>

        <h3>Threat Intelligence</h3>
        <p><b>Abuse Score:</b> ${abuse}</p>
        <p><b>Reports:</b> ${reports}</p>
        <p><b>Last Report:</b> ${threat?.lastReportedAt || "None"}</p>

        <p class="${level}">Risk: ${risk} (${level.toUpperCase()})</p>

        <h3>Device</h3>
        <p>${device.deviceType} | ${device.os} | ${device.browser}</p>

        <div class="progress">
            <div class="progress-bar" style="width:${risk}%; background:${level==="high"?"red":level==="medium"?"orange":"green"}"></div>
        </div>
        `;

        initMap(geo.latitude, geo.longitude);
        updateChart(abuse);

    }catch(e){
        loader.classList.add("hidden");
        result.innerHTML = "Error fetching data";
    }
}

// ================= CHART =================
function updateChart(abuse){
    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("riskChart"), {
        type: "bar",
        data: {
            labels: ["Abuse Score"],
            datasets: [{
                label: "Threat Level",
                data: [abuse],
                backgroundColor: ["#ef4444"]
            }]
        },
        options: {
            responsive: true,
            scales: { y: { beginAtZero: true, max: 100 } }
        }
    });
}

// ================= INIT =================
window.onload = getMyIP;
</script>

</body>
</html>
